name: Generate Protos and Push to Repo B

on:
  push:
    branches:
      - main
    paths:
      - '**/*.proto'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A (Protos)
        uses: actions/checkout@v3
        with:
          path: repo-a

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          version: '24.3'

      - name: Install protoc-gen-go and protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Checkout Repo B (Generated Code)
        uses: actions/checkout@v3
        with:
          repository: youruser/repo-b # REPLACE WITH YOUR REPO B PATH
          token: ${{ secrets.PAT_TOKEN }} # REQUIRES A PERSONAL ACCESS TOKEN SETUP IN REPO A
          path: repo-b

      - name: Generate Go Code
        run: |
          mkdir -p repo-b/payment/v1 repo-b/order/v1
          
          protoc -I repo-a/payment/v1 \
            --go_out=repo-b --go_opt=paths=source_relative \
            --go-grpc_out=repo-b --go-grpc_opt=paths=source_relative \
            repo-a/payment/v1/*.proto

          protoc -I repo-a/order/v1 \
            --go_out=repo-b --go_opt=paths=source_relative \
            --go-grpc_out=repo-b --go-grpc_opt=paths=source_relative \
            repo-a/order/v1/*.proto

      - name: Push to Repo B
        working-directory: repo-b
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-generate protos from Repo A"
            # Optional: cut a new tag here for dependency management
            # NEW_TAG="v1.0.$(date +%s)"
            # git tag $NEW_TAG
            # git push origin main --tags
            git push origin main
          else
            echo "No changes in generated code."
          fi
